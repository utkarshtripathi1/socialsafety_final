{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Location Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212;
    color:#fff;
    text-align:center;
    padding:30px;
}

h1{
    margin-bottom:25px;
    color:#00d4ff;
}

button{
    padding:14px 28px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    color:#111;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00b8df;
    transform:scale(1.05);
}

/* Hidden until button is clicked */
#details{
    display:none;
    width:90%;
    max-width:900px;
    margin:25px auto;
    padding:20px;
    background:#1e1e1e;
    border-radius:12px;
    border:1px solid #333;
    box-shadow:0 0 15px rgba(0,212,255,.2);
    text-align:left;
}

#details p{
    margin:10px 0;
    font-size:17px;
}

#details b{
    color:#00d4ff;
}

#map{
    display: none;
    width:90%;
    max-width:900px;
    height:500px;
    margin:25px auto;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00d4ff;
    box-shadow:0 0 20px rgba(0,212,255,.25);
}
</style>

</head>
<body>

<h1>📍 Current Location </h1>

<button onload="getLocation()">Show My Location</button>

<div id="details"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;

// Get Current Location
function getLocation(){

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(showPosition, showError);

    }else{

        alert("Geolocation is not supported by this browser.");
    }

}

// Show Position
async function showPosition(position){

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    // Reverse Geocoding
    const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`
    );

    const data = await response.json();

    //show map
     let mapping = document.getElementById("map");
    mapping.style.display = "block";

    // Show Details Box
    const details = document.getElementById("details");
    details.style.display = "block";

    details.innerHTML = `
        <p><b>📍 Latitude:</b> ${lat}</p>
        <p><b>📍 Longitude:</b> ${lon}</p>
        <p><b>🏠 Location:</b> ${data.name || "Unknown"}</p>
        <p><b>🗺 Full Address:</b> ${data.display_name}</p>
        <p><b>🏙 City:</b> ${data.address.city || data.address.town || data.address.village || "-"}</p>
        <p><b>🌎 State:</b> ${data.address.state || "-"}</p>
        <p><b>🌍 Country:</b> ${data.address.country || "-"}</p>
        <p><b>📮 Postal Code:</b> ${data.address.postcode || "-"}</p>
    `;

    // Remove previous map
    if(map){
        map.remove();
    }

    // Create map
    map = L.map('map').setView([lat, lon], 16);

    // OpenStreetMap Tiles
    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap contributors'
        }
    ).addTo(map);

    // Marker
    L.marker([lat, lon])
        .addTo(map)
        .bindPopup(`
            <b>You are here</b><br>
            ${data.display_name}
        `)
        .openPopup();

}

// Error Handling
function showError(error){

    switch(error.code){

        case error.PERMISSION_DENIED:
            alert("Location permission denied.");
            break;

        case error.POSITION_UNAVAILABLE:
            alert("Location information unavailable.");
            break;

        case error.TIMEOUT:
            alert("Location request timed out.");
            break;

        default:
            alert("An unknown error occurred.");
    }

}

</script>

</body>
</html>
