{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeHer - Profile</title>

<link href="{% static '/css/profile.css' %}" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<div class="logo">
🛡 SafeHer
</div>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="contacts.html">👨‍👩‍👧 Contacts</a>
<a href="report.html">📝 Report Incident</a>
<a href="profile.html">👤 Profile</a>
<a href="index.html">🚪 Logout</a>

</div>

<div class="main">

<div class="profile-card">

<div class="profile-header">

<img
src="https://via.placeholder.com/140"
id="profileImage"
class="profile-pic">

<br>

<input
type="file"
id="imageUpload"
class="upload-btn"
accept="image/*">

<h2 id="displayName">
User Name
</h2>

<p>
SafeHer Member
</p>

</div>

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter Name">

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email">

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="Enter Phone Number">

</div>

<button
class="btn"
onclick="saveProfile()">

Save Profile

</button>

<div class="settings">

<h3>
Settings
</h3>

<div class="toggle">

<span>
🌙 Dark Mode
</span>

<button
class="btn"
onclick="toggleDarkMode()">

Toggle

</button>

</div>

<div class="toggle">

<span>
📍 Share Location During SOS
</span>

<input
type="checkbox"
checked>

</div>

<div class="toggle">

<span>
📲 Notify Trusted Contacts
</span>

<input
type="checkbox"
checked>

</div>

</div>

</div>

</div>

<script>

const imageUpload =
document.getElementById(
"imageUpload"
);

imageUpload.addEventListener(
"change",
function(){

const file =
this.files[0];

if(file){

document.getElementById(
"profileImage"
).src =
URL.createObjectURL(file);

}

}
);

function saveProfile(){

const profile = {

name:
document.getElementById(
"name"
).value,

email:
document.getElementById(
"email"
).value,

phone:
document.getElementById(
"phone"
).value

};

localStorage.setItem(
"safeherProfile",
JSON.stringify(profile)
);

document.getElementById(
"displayName"
).innerText =
profile.name || "User Name";

alert(
"Profile Saved Successfully!"
);

}

function loadProfile(){

const profile =
JSON.parse(
localStorage.getItem(
"safeherProfile"
)
);

if(profile){

document.getElementById(
"name"
).value =
profile.name || "";

document.getElementById(
"email"
).value =
profile.email || "";

document.getElementById(
"phone"
).value =
profile.phone || "";

document.getElementById(
"displayName"
).innerText =
profile.name || "User Name";

}

}

function toggleDarkMode(){

document.body.classList.toggle(
"dark"
);

}

loadProfile();

</script>

</body>
</html>
